<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Bulk Generator PRO</title>
<link rel="icon" href="https://img.icons8.com/ios/100/youtube-play--v1.png">

<style>
    /* หน้าจัดการ (UI หลัก) */
    body{ font-family:Arial; background:#f5f6f8; margin:0; padding:40px; }
    .container{ max-width:900px; margin:auto; background:#fff; padding:30px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
    h1{ color:#e53935; margin-top:0; }
    label { font-weight: bold; display: block; margin-top: 15px; }
    input, textarea{ width:100%; padding:12px; margin-top:10px; border:2px solid #ddd; border-radius:8px; font-family:Arial; box-sizing: border-box; }
    textarea{ height:180px; font-family:monospace; }
    button{ padding:14px 18px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; transition: 0.2s; }
    .generate{ background:#e53935; color:white; width:100%; margin-top:15px; font-size:16px; }
    .generate:hover{ background:#c62828; }
    .tools{ margin-top:15px; display:flex; gap:10px; }
    .copy{ background:#333; color:white; }
    .download{ background:#1976d2; color:white; }
    #output{ margin-top:25px; display:none; }
    .codebox{ background:#111; color:#0f0; padding:20px; border-radius:8px; max-height:400px; overflow:auto; white-space:pre-wrap; font-size: 13px; }
</style>
</head>

<body>

<div class="container">
    <h1>YouTube Bulk Generator PRO</h1>

    <label>1. Meta Title</label>
    <input type="text" id="metaTitle" placeholder="ระบุชื่อหัวข้อเว็บ">

    <label>2. Favicon URL</label>
    <input type="text" id="favicon" placeholder="https://www.google.com/favicon.ico">

    <label>3. ชื่อไฟล์ที่จะดาวน์โหลด</label>
    <input type="text" id="fileNameInput" placeholder="my-youtube-list">

    <label>4. วางข้อมูลจาก Excel (A: ชื่อ | B: ลิงก์)</label>
    <textarea id="links" placeholder="วางข้อมูลที่ Copy มาจาก Excel (คอลัมน์ A และ B) ได้เลย..."></textarea>

    <button class="generate" onclick="generate()">Generate HTML (V2.3)</button>

    <div class="tools">
        <button class="copy" onclick="copyCode()">Copy Code</button>
        <button class="download" onclick="downloadHTML()">Download HTML</button>
    </div>

    <div id="output">
        <h3>Generated Code</h3>
        <div class="codebox" id="code"></div>
    </div>
</div>

<script>
function extractID(url){
    let id=null;
    if(!url) return null;
    if(url.includes("youtu.be/")) id=url.split("youtu.be/")[1];
    else if(url.includes("watch?v=")) id=url.split("watch?v=")[1];
    else if(url.includes("shorts/")) id=url.split("shorts/")[1];
    if(!id) return null;
    return id.split("&")[0].split("?")[0];
}

function generate(){
    let input = document.getElementById("links").value.trim();
    let metaTitle = document.getElementById("metaTitle").value.trim();
    let favicon = document.getElementById("favicon").value.trim();

    if(!input){ alert("กรุณาวางข้อมูล"); return; }

    let lines = input.split("\n");
    let items = "";
    let options = "";
    let count = 0;

    lines.forEach((line, index) => {
        if(!line.trim()) return;
        let title = "";
        let link = "";

        if(line.includes("\t")){
            let parts = line.split("\t");
            title = parts[0].trim();
            link = parts[1] ? parts[1].trim() : "";
        } else if(line.includes("|")){
            let parts = line.split("|");
            title = parts[0].trim();
            link = parts[1].trim();
        } else {
            title = "Video " + (index + 1);
            link = line.trim();
        }

        let id = extractID(link);
        if(!id) return;

        // เพิ่ม enablejsapi=1 เพื่อให้ควบคุมผ่าน JS ได้
        let src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&playsinline=1&loop=1&playlist=${id}&enablejsapi=1`;
        let videoDivId = `vid-${count}`;

        options += `<option value="${videoDivId}">${title}</option>`;
        items += `<div class="yt-item" id="${videoDivId}"><iframe data-src="${src}" ${count < 2 ? `src="${src}"` : ""} loading="lazy" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
        count++;
    });

    let htmlContent = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${metaTitle || "YouTube Player"}</title>
    ${favicon ? `<link rel="icon" href="${favicon}">` : ""}
    <style>
        body { margin:0; background:#000; font-family: sans-serif; overflow: hidden; }
        
        .bottom-nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 9999; width: 90%; max-width: 450px;
            display: flex; gap: 10px; align-items: center;
            opacity: 0.6; transition: opacity 0.3s;
        }
        .bottom-nav:hover { opacity: 1; }
        
        select { 
            flex-grow: 1; padding: 12px; border-radius: 30px; 
            background: rgba(20, 20, 20, 0.95); color: #fff; 
            border: 2px solid #e53935; font-size: 16px; outline: none; cursor: pointer;
        }
        
        /* ปุ่ม Pause All */
        .pause-btn {
            background: #e53935; color: white; border: none;
            width: 45px; height: 45px; border-radius: 50%;
            font-size: 20px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .pause-btn:active { transform: scale(0.9); }

        .container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .yt-item { height: 100vh; scroll-snap-align: start; position: relative; width: 100%; }
        .yt-item iframe { position: absolute; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

<div class="bottom-nav">
    <select onchange="handleNavigation(this.value)">
        <option value="">🚀 เลือกวิดีโอ...</option>
        ${options}
    </select>
    <button class="pause-btn" onclick="pauseAllVideos()" title="Pause All">⏸</button>
</div>

<div class="container">${items}</div>

<script>
    // ฟังก์ชันสั่งหยุดทุกวิดีโอ
    function pauseAllVideos() {
        const iframes = document.querySelectorAll('iframe');
        iframes.forEach(iframe => {
            if(iframe.src) {
                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            }
        });
    }

    // ฟังก์ชันเลื่อนและเล่นวิดีโอที่เลือก
    function handleNavigation(vidId) {
        if(!vidId) return;
        
        // 1. หยุดวิดีโอทั้งหมดก่อน
        pauseAllVideos();
        
        // 2. เลื่อนไปยังวิดีโอที่เลือก
        const target = document.getElementById(vidId);
        target.scrollIntoView({behavior:'smooth'});
        
        // 3. สั่งให้วิดีโอเป้าหมายเล่น (ถ้าโหลด src แล้ว)
        const iframe = target.querySelector('iframe');
        if(iframe.src) {
            setTimeout(() => {
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            }, 500); // หน่วงเวลาให้เลื่อนเสร็จก่อนเล่น
        }
    }

    let observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
            let iframe = e.target.querySelector("iframe");
            if(e.isIntersecting && !iframe.src){ iframe.src = iframe.dataset.src; }
        });
    }, {threshold: 0.5});
    document.querySelectorAll(".yt-item").forEach(el => { observer.observe(el); });
<\/script>

</body>
</html>`;

    document.getElementById("code").textContent = htmlContent;
    document.getElementById("output").style.display = "block";
}

function copyCode(){
    let code = document.getElementById("code").textContent;
    navigator.clipboard.writeText(code).then(() => alert("คัดลอกโค้ดแล้ว!"));
}

function downloadHTML(){
    let code = document.getElementById("code").textContent;
    let fileName = document.getElementById("fileNameInput").value.trim() || "youtube-tool";
    let blob = new Blob([code], {type:"text/html"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fileName + ".html";
    a.click();
}
</script>

</body>
</html>
